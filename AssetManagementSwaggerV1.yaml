swagger: "2.0"

info:
  title: Asset & License Management Service
  version: "1.0.0"
  description: "API for managing assets, categories, and authentication."

host: localhost:7107
basePath: /api

schemes:
  - https
  - http

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

paths:

  /auth/login:
    post:
      summary: Login get JWT token
      tags:
        - Auth
      description: Authenticate user and return JWT token.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/LoginRequest'
      produces:
        - application/json
      responses:
        200:
          description: Login successful
          schema:
            $ref: '#/definitions/LoginEnvelope'
        400:
          description: Bad request
        401:
          description: Unauthorized

  /api/admin/createasset:
    post:
      summary: Create Asset
      tags:
        - Assets
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateAssetRequest'
      produces:
        - application/json
      responses:
        201:
          description: Asset created
          schema:
            $ref: '#/definitions/CreateAssetRequest'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestEnvelope'

  /api/admin/getasset/{id}:
    get:
      summary: Get Asset by ID
      tags:
        - Assets
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      produces:
        - application/json
      responses:
        200:
          description: Asset detail
          schema:
            $ref: '#/definitions/AssetDetailEnvelope'
        404:
          description: Not Found
          schema:
            $ref: '#/definitions/NotFoundEnvelope'
            
  /api/admin/updateasset/{id}:
    put:
      summary: Update Asset
      tags:
        - Assets
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/UpdateAssetRequest'
      produces:
        - application/json
      responses:
        200:
          description: Updated
          schema:
            $ref: '#/definitions/UpdateAssetRequest'
        400:
          description: Invalid update data
          schema:
            $ref: '#/definitions/BadRequestEnvelope'
        404:
          description: Asset to update not found
          schema:
            $ref: '#/definitions/NotFoundEnvelope'

  /assets/{id}/assign:
    post:
      summary: "Assign asset to an employee"
      tags:
        - Assets
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/AssignAssetRequest'
      produces:
        - application/json
      responses:
        200:
          description: "Asset assigned successfully"
          schema:
            $ref: '#/definitions/AssetDetailEnvelope'

  /api/admin/returnasset/{id}:
    post:
      summary: Return an Asset
      tags:
        - Assets
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          description: ID of the asset being returned
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/ReturnAssetRequest'
      produces:
        - application/json
      responses:
        200:
          description: Asset returned successfully
          schema:
            $ref: '#/definitions/AssetDetailEnvelope'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestEnvelope'
        404:
          description: Not Found
          schema:
            $ref: '#/definitions/NotFoundEnvelope'

  /api/admin/reportlist:
    get:
      summary: Get Asset Reports
      tags:
        - Reports
      security:
        - Bearer: []
      parameters:
        - name: status
          in: query
          description: Filter by asset status
          required: false
          type: string
        - name: category
          in: query
          description: Filter by category
          required: false
          type: string
      produces:
        - application/json
      responses:
        200:
          description: List of assets for reporting
          schema:
            $ref: '#/definitions/AssetListEnvelope'

definitions:

  LoginRequest:
    type: object
    properties:
      email:
        type: string

  LoginEnvelope:
    type: object
    properties:
      data:
        type: object
        properties:
          token:
            type: string
          expiryDate:
            type: string
      error:
        type: string
        example: null
      statusCode:
        type: integer

  CreateAssetRequest:
    type: object
    properties:
      assetName:
        type: string
      assetCategory:
        type: string
      assetId:
        type: integer
      serialNumber:
        type: integer
      purchaseDate:
        type: string
      assetCost:
        type: number
      vendorName:
        type: string
      assetStatus:
        type: string
      description:
        type: string
      assignEmployee:
        type: string

  UpdateAssetRequest:
    type: object
    properties:
      data:
        type: object
        properties:
          assetName:
            type: string
          assetCategory:
            type: string
          assetId:
            type: integer
          serialNumber:
            type: integer
          purchaseDate:
            type: string
          assetCost:
            type: number
          vendorName:
            type: string
          assetStatus:
            type: string
          description:
            type: string
          assignEmployee:
            type: string
      error:
        type: string
        example: null
      statusCode:
        type: integer

  AssetDetailEnvelope:
    type: object
    properties:
      data:
        type: object
        properties:
          assetName:
            type: string
          assetCategory:
            type: string
          assetId:
            type: integer
          serialNumber:
            type: integer
          purchaseDate:
            type: string
          assetCost:
            type: number
          vendorName:
            type: string
          assetStatus:
            type: string
          description:
            type: string
          assignEmployee:
            type: string
      error:
        type: string
        example: null
      statusCode:
        type: integer

  BadRequestEnvelope:
    type: object
    properties:
      data:
        type: object
        example: null
      error:
        type: string
        example: "Validation failed."
      statusCode:
        type: integer
        example: 400

  NotFoundEnvelope:
    type: object
    properties:
      data:
        type: object
        example: null
      error:
        type: string
        example: "The requested resource was not found."
      statusCode:
        type: integer
        example: 404

  AssignAssetRequest:
    type: object
    properties:
      data:
        type: object
        properties:
          employeeId:
            type: integer
          assignmentDate:
            type: string
          expectedReturnDate:
            type: string
          notes:
            type: string
      error:
        type: string
        example: null
      statusCode:
        type: integer

  ReturnAssetRequest:
    type: object
    properties:
      returnDate:
        type: string
      conditionOnReturn:
        type: string
      notes:
        type: string

  AssetListEnvelope:
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/CreateAssetRequest'
      error:
        type: string
        example: null
      statusCode:
        type: integer
